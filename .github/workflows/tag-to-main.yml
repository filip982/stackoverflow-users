name: Tag → Main PR

on:
  push:
    tags:
      - 'v*'

jobs:
  open-release-pr:
    name: Open release PR to main
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          # Get the previous tag to diff against
          PREV_TAG=$(git tag --sort=-creatordate | sed -n '2p')
          CURRENT_TAG=${GITHUB_REF#refs/tags/}

          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" ${PREV_TAG}..HEAD)
          fi

          echo "current_tag=$CURRENT_TAG" >> $GITHUB_OUTPUT
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT

          # Write changelog to file to preserve newlines
          echo "$CHANGELOG" > /tmp/changelog.txt

      - name: Open PR to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_TAG="${{ steps.changelog.outputs.current_tag }}"
          PREV_TAG="${{ steps.changelog.outputs.prev_tag }}"
          CHANGELOG=$(cat /tmp/changelog.txt)

          RANGE="${PREV_TAG:+$PREV_TAG..}HEAD"
          [ -z "$PREV_TAG" ] && RANGE_LABEL="all commits" || RANGE_LABEL="since $PREV_TAG"

          gh pr create \
            --base main \
            --head develop \
            --title "Release $CURRENT_TAG" \
            --body "## Release $CURRENT_TAG

          ## Changelog ($RANGE_LABEL)
          $CHANGELOG

          ## Release checklist
          - [ ] All feature PRs merged to develop
          - [ ] Tests passing
          - [ ] Manual smoke test on device/simulator
          - [ ] Version bump confirmed ($CURRENT_TAG)"
