name: Issue Implementation

on:
  issues:
    types: [labeled]

jobs:
  implement:
    name: Trigger orchestrator
    if: github.event.label.name == 'ready-for-implementation'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Swap label to in-progress
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit ${{ github.event.issue.number }} \
            --remove-label "ready-for-implementation" \
            --add-label "in-progress"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run orchestrator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          claude --print \
            --allowedTools "Bash(git checkout:*),Bash(git push:*),Bash(git add:*),Bash(git commit:*),Bash(gh issue:*),Bash(gh pr create:*),Bash(gh pr comment:*),Read,Write,Edit,Glob,Grep,Agent" \
            -p "You are the orchestrator for the StackOverflow Users iOS app.

          A GitHub issue has been labeled 'ready-for-implementation'. Your job is to implement it.

          Issue number: #${{ github.event.issue.number }}
          Issue title: ${{ github.event.issue.title }}
          Issue body:
          ${{ github.event.issue.body }}

          Instructions:
          1. Read docs/architecture.md and docs/PROJECT_SPEC.md for full context.
          2. Follow the orchestrator workflow defined in .claude/agents/orchestrator.md exactly.
          3. Create a feature branch from develop named after this issue (e.g. feature/user-list).
          4. Delegate implementation to the appropriate worker agents in dependency order.
          5. When implementation is complete, open a PR targeting develop with 'Closes #${{ github.event.issue.number }}' in the body.
          6. Post a comment on issue #${{ github.event.issue.number }} with the PR URL and a summary of what was built.

          Work in the current directory. The repo is already checked out on develop."
